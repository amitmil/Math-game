<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>פּוֹקֵי-מָתֵמָטִיקָה - מַהֲדּוּרַת פְּרֶמְיוּם</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary-color: #3b82f6;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --gold-color: #f59e0b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 430px;
            height: 100vh;
            max-height: 850px;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .screen {
            display: none;
            flex-direction: column;
            height: 100%;
            padding: 20px 20px calc(env(safe-area-inset-bottom) + 55px) 20px; /* מורם מסיבית למניעת התנגשות עם מקשי אנדרואיד */
            justify-content: space-between;
            overflow-y: auto;
        }

        .screen.active {
            display: flex;
        }

        /* חסימת גלילה למסכי משחק קריטיים */
        #screen-game, #screen-puzzle {
            overflow: hidden;
        }

        /* מסך כניסה והרשמה */
        .auth-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 10px;
        }

        .auth-tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            background-color: var(--card-bg);
            padding: 6px;
            border-radius: 15px;
        }

        .auth-tab {
            padding: 12px;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
            border-radius: 10px;
            color: var(--text-muted);
            font-size: 22px;
        }

        .auth-tab.active {
            background-color: var(--primary-color);
            color: white;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-weight: bold;
            font-size: 22px;
            color: #ffcb05;
        }

        .form-group input {
            background-color: var(--card-bg);
            border: 2px solid #334155;
            border-radius: 14px;
            padding: 15px;
            color: white;
            font-size: 20px;
            outline: none;
            -webkit-user-select: text;
            user-select: text;
        }

        .form-group input:focus {
            border-color: var(--primary-color);
        }

        /* גריד בחירת אווטאר */
        .avatar-grid-auth {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            max-height: 200px;
            overflow-y: auto;
            padding: 8px;
            background: rgba(30, 41, 59, 0.5);
            border-radius: 16px;
        }

        .avatar-item-auth {
            background-color: var(--card-bg);
            border: 2px solid #334155;
            border-radius: 14px;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .avatar-item-auth.selected {
            border-color: #ffcb05;
            background-color: #1e3a8a;
        }

        .avatar-img-auth {
            width: 50px;
            height: 55px;
            object-fit: contain;
        }

        .avatar-name-auth {
            font-size: 18px;
            font-weight: bold;
        }

        /* מסך בית / מפת שלבים */
        .title-main {
            text-align: center;
            font-size: 46px;
            font-weight: 900;
            color: #ffcb05;
            text-shadow: -3px -3px 0 #3b4cca, 3px -3px 0 #3b4cca, -3px 3px 0 #3b4cca, 3px 3px 0 #3b4cca;
            margin-top: 10px;
        }

        .user-welcome-header {
            display: flex;
            align-items: center;
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 15px;
            margin-top: 10px;
            gap: 15px;
        }

        .header-avatar {
            width: 55px;
            height: 60px;
            object-fit: contain;
        }

        .header-info {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .header-info .name {
            font-size: 24px;
            font-weight: bold;
            color: #f8fafc;
        }

        .logout-btn {
            background: none;
            border: none;
            color: var(--danger-color);
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-align: right;
            margin-top: 4px;
            width: fit-content;
        }

        .stages-map-container {
            flex-grow: 1;
            overflow-y: auto;
            margin: 15px 0;
            padding: 10px;
            background-color: rgba(30, 41, 59, 0.4);
            border-radius: 24px;
            border: 2px dashed #334155;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scrollbar-width: none;
        }
        .stages-map-container::-webkit-scrollbar { display: none; }

        .stage-node {
            background-color: var(--card-bg);
            border: 3px solid #334155;
            border-radius: 20px;
            padding: 18px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .stage-node.locked {
            opacity: 0.5;
            cursor: not-allowed;
            background-color: #0f172a;
        }

        .stage-node.current {
            border-color: var(--primary-color);
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.4);
            background: linear-gradient(135deg, #1e293b 0%, #172554 100%);
        }

        .stage-node.completed {
            border-color: var(--success-color);
            background: linear-gradient(135deg, #1e293b 0%, #064e3b 100%);
        }

        .stage-node-title {
            font-size: 24px;
            font-weight: 800;
        }
        
        .stage-node-status {
            font-size: 18px;
            font-weight: bold;
            padding: 6px 15px;
            border-radius: 50px;
            background-color: rgba(15, 23, 42, 0.6);
        }

        .btn-menu {
            background: linear-gradient(135deg, #ffcb05 0%, #f59e0b 100%);
            color: #0f172a;
            border: none;
            border-radius: 20px;
            padding: 18px;
            font-size: 26px;
            font-weight: 800;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 5px 0 #b45309;
            width: 100%;
        }

        /* מסך משחק */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--card-bg);
            padding: 12px 20px;
            border-radius: 20px;
            font-size: 20px;
            font-weight: bold;
        }

        .math-arena {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: var(--card-bg);
            border-radius: 28px;
            margin: 10px 0;
            padding: 15px;
            border: 2px solid #334155;
        }

        .stage-indicator {
            font-size: 26px;
            color: var(--gold-color);
            font-weight: 800;
            margin-bottom: 5px;
        }

        .equation {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            font-size: 95px; /* פונט ענק לילדים */
            font-weight: 900;
            direction: ltr;
        }

        .equation-input {
            min-width: 130px;
            text-align: center;
            color: #38bdf8;
            border-bottom: 8px solid #38bdf8;
            padding-bottom: 2px;
        }

        /* מקלדת */
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 12px;
        }

        .key {
            background-color: #334155;
            border: none;
            border-radius: 20px;
            padding: 16px 10px;
            font-size: 34px;
            font-weight: 900;
            color: white;
            cursor: pointer;
        }
        .key:active { background-color: #475569; }
        .key.action { background-color: #1e293b; color: var(--danger-color); }

        .btn-check {
            width: 100%;
            background-color: var(--success-color);
            border: none;
            border-radius: 20px;
            padding: 20px;
            font-size: 26px;
            font-weight: 900;
            color: white;
            box-shadow: 0 6px 0 #047857;
            cursor: pointer;
            margin-bottom: 15px; /* מורם משמעותית */
        }
        .btn-check:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #047857;
        }

        /* פאזל - שכבות מתוקנות לחלוטין */
        .puzzle-wrapper {
            position: relative;
            width: 250px;
            height: 250px;
            margin: auto;
            background-color: var(--card-bg);
            border-radius: 24px;
            border: 4px solid #334155;
            overflow: hidden;
        }

        .puzzle-img-back {
            width: 90%;
            height: 90%;
            object-fit: contain;
            position: absolute;
            top: 5%;
            left: 5%;
            z-index: 1; /* התמונה מאחור */
        }

        .puzzle-board {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 2px;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2; /* חלקי הפאזל מקדימה ומסתירים אותה */
            background-color: transparent;
        }

        .puzzle-piece {
            background-color: #0f172a; /* צבע אטום לחלוטין שמסתיר את התמונה */
            opacity: 1;
            transition: opacity 0.4s ease;
        }

        .puzzle-piece.unlocked { 
            opacity: 0; /* נעלם וחושף את החלק המקביל בתמונה */
            pointer-events: none;
        }

        /* מסך אוסף */
        .collection-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            overflow-y: auto;
            padding: 10px 5px;
            flex-grow: 1;
        }

        .collection-item {
            background-color: var(--card-bg);
            border-radius: 24px;
            padding: 20px 10px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 3px solid #334155;
            position: relative;
            cursor: pointer;
        }

        .collection-item.completed {
            border-color: #ffcb05;
            background: linear-gradient(180deg, #1e293b 0%, rgba(255, 203, 5, 0.1) 100%);
        }

        .col-img-container {
            width: 120px;
            height: 120px;
            position: relative;
            margin-bottom: 10px;
        }

        .col-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .col-img.locked { filter: brightness(0); }
        .col-img.has-pieces { filter: brightness(0.15); }
        .col-img.completed { filter: none; }

        .col-name {
            font-size: 22px;
            font-weight: bold;
            color: var(--text-main);
            margin-bottom: 6px;
        }

        .col-badge {
            background-color: #0f172a;
            padding: 6px 15px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 800;
            color: #38bdf8;
        }

        .back-btn {
            background: none;
            border: none;
            color: #38bdf8;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            padding: 10px;
            display: flex;
            align-items: center;
        }

        /* מודל פוקימון מוגדל */
        .modal {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 23, 42, 0.98);
            z-index: 100;
            flex-direction: column;
            padding: 30px 20px calc(env(safe-area-inset-bottom) + 50px) 20px;
            justify-content: space-between;
        }
        .modal.active { display: flex; }

        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            animation: fall 2.5s linear infinite;
            top: -10px;
            z-index: 99;
        }
        @keyframes fall { to { transform: translateY(850px) rotate(360deg); } }
    </style>
</head>
<body>

<div class="app-container" id="app">
    
    <!-- מסך 0: התחברות / הרשמה -->
    <div id="screen-auth" class="screen active">
        <div>
            <h1 class="title-main">פּוֹקֵי-מָתֵמָטִיקָה</h1>
            <p style="text-align: center; color: var(--text-muted); margin-top: 5px; font-size: 18px;">מַסָּע הַמִּסְפָּרִים הַגָּדוֹל!</p>
        </div>

        <div class="auth-container">
            <div class="auth-tabs">
                <div class="auth-tab active" id="tab-login" onclick="setAuthTab('login')">כְּנִיסָה</div>
                <div class="auth-tab" id="tab-register" onclick="setAuthTab('register')">הַרְשָׁמָה</div>
            </div>

            <div class="form-group" id="group-firstname" style="display: none;">
                <label>שֵׁם פְּרָטִי:</label>
                <input type="text" id="auth-firstname" placeholder="הַכְנֵס שֵׁם פְּרָטִי">
            </div>

            <div class="form-group" id="group-username">
                <label id="label-username">שֵׁם פְּרָטִי אוֹ כִּינוּי:</label>
                <input type="text" id="auth-username" placeholder="הַכְנֵס שֵׁם אוֹ כִּינוּי">
            </div>

            <div class="form-group" id="group-nickname" style="display: none;">
                <label>כִּינוּי:</label>
                <input type="text" id="auth-nickname" placeholder="הַכְנֵס כִּינוּי">
            </div>

            <div class="form-group">
                <label id="label-dob">קוֹד כְּנִיסָה (4 סִפְרוֹת):</label>
                <input type="text" id="auth-dob" pattern="[0-9]*" inputmode="numeric" maxlength="4" placeholder="לְדֻגְמָא: 1405">
            </div>

            <div class="form-group" id="group-avatar" style="display: none;">
                <label>בְּחַר מְאַמֵּן פוֹקֵימוֹן:</label>
                <div class="avatar-grid-auth" id="avatar-picker-grid">
                    <!-- יתמלא דינמית -->
                </div>
            </div>
        </div>

        <button class="btn-menu" id="btn-auth-action" onclick="handleAuth()">הִתְחַבֵּר וְשַׂחֵק! 🚀</button>
    </div>
    
    <!-- מסך 1: מפת השלבים המקובעת -->
    <div id="screen-hub" class="screen">
        <div>
            <h1 class="title-main">פּוֹקֵי-מָתֵמָטִיקָה</h1>
            
            <div class="user-welcome-header">
                <img src="" class="header-avatar" id="user-header-img">
                <div class="header-info">
                    <div class="name" id="user-welcome-text">שָׁלוֹם, הַמְּאַמֵּן!</div>
                    <button class="logout-btn" onclick="handleLogout()">הַחְלֵף מִשְׁתַּמֵּשׁ 🔄</button>
                </div>
            </div>
        </div>
        
        <div class="stages-map-container" id="stages-map">
            <!-- נוצר דינמית -->
        </div>

        <div class="bottom-nav-hub">
            <button class="btn-menu" style="background: #1e293b; color: #38bdf8; border: 2px solid #334155; box-shadow: none;" onclick="openCollection()">📜 הָאוֹסֶף הָעֲנָק שֶׁלִּי</button>
        </div>
    </div>

    <!-- מסך 2: זירת המשחק -->
    <div id="screen-game" class="screen">
        <div class="top-bar">
            <span style="color: var(--danger-color);" id="game-streak">🔥 רֶצֶף: 0</span>
            <span style="color: #38bdf8;" id="game-progress">📝 תרגיל: 1/7</span>
            <span style="cursor: pointer; font-size: 24px;" onclick="returnToHub()">🏠</span>
        </div>

        <div class="math-arena">
            <div class="stage-indicator" id="arena-stage-title">שלב 1</div>
            <div class="equation">
                <span id="eq-n1">0</span>
                <span id="eq-op">+</span>
                <span id="eq-n2">0</span>
                <span>=</span>
                <span class="equation-input" id="eq-input">?</span>
            </div>
        </div>

        <div class="keypad">
            <button class="key" onclick="pressKey('1')">1</button>
            <button class="key" onclick="pressKey('2')">2</button>
            <button class="key" onclick="pressKey('3')">3</button>
            <button class="key" onclick="pressKey('4')">4</button>
            <button class="key" onclick="pressKey('5')">5</button>
            <button class="key" onclick="pressKey('6')">6</button>
            <button class="key" onclick="pressKey('7')">7</button>
            <button class="key" onclick="pressKey('8')">8</button>
            <button class="key" onclick="pressKey('9')">9</button>
            <button class="key action" onclick="pressKey('C')">C</button>
            <button class="key" onclick="pressKey('0')">0</button>
            <button class="key action" onclick="pressKey('B')">⌫</button>
        </div>

        <button class="btn-check" id="btn-action" onclick="checkAnswer()">בְּדֹק! ✔️</button>
    </div>

    <!-- מסך 3: מסך פאזל סוף שלב -->
    <div id="screen-puzzle" class="screen">
        <h2 style="text-align: center; font-size: 32px; color: #ffcb05;" id="puzzle-title">הַשָּׁלָב הוּשְׁלַם! 🧩</h2>
        
        <div style="flex-grow: 1; display: flex; flex-direction: column; justify-content: center;">
            <div class="puzzle-wrapper">
                <img src="" class="puzzle-img-back" id="puzzle-img-back" alt="pokemon">
                <div class="puzzle-board" id="puzzle-board">
                    <div class="puzzle-piece"></div><div class="puzzle-piece"></div><div class="puzzle-piece"></div><div class="puzzle-piece"></div>
                    <div class="puzzle-piece"></div><div class="puzzle-piece"></div><div class="puzzle-piece"></div><div class="puzzle-piece"></div>
                    <div class="puzzle-piece"></div><div class="puzzle-piece"></div><div class="puzzle-piece"></div><div class="puzzle-piece"></div>
                </div>
            </div>
            <p id="puzzle-status" style="text-align: center; font-size: 24px; font-weight: bold; margin-top: 25px;"></p>
        </div>

        <button class="btn-menu" onclick="finishPuzzleAndGoHome()">חֲזָרָה לַמַּפָּה 🗺️</button>
    </div>

    <!-- מסך 4: מסך אוסף ענק -->
    <div id="screen-collection" class="screen">
        <div class="collection-container">
            <div style="display: flex; align-items: center; margin-bottom: 15px;">
                <button class="back-btn" onclick="returnToHub()">❮ חֲזָרָה</button>
                <h2 style="margin: 0 auto; padding-right: 50px; font-size: 28px; color: #ffcb05;">הָאוֹסֶף הָעֲנָק שֶׁלִּי</h2>
            </div>
            <div class="collection-grid" id="collection-grid"></div>
        </div>
    </div>

    <!-- מסך 5: מודל תצוגה מוגדלת -->
    <div id="view-pokemon-modal" class="modal">
        <div style="display: flex; align-items: center;">
            <button class="back-btn" onclick="closePokemonModal()">❮ סְגִירָה</button>
            <h2 id="modal-pokemon-name" style="margin: 0 auto; padding-right: 50px; font-size: 32px; color: #ffcb05;"></h2>
        </div>

        <div style="flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;">
            <div class="puzzle-wrapper" style="width: 280px; height: 280px;">
                <img src="" class="puzzle-img-back" id="modal-pokemon-img" style="width:90%; height:90%;">
                <div class="puzzle-board" id="modal-puzzle-board">
                    <div class="puzzle-piece"></div><div class="puzzle-piece"></div><div class="puzzle-piece"></div><div class="puzzle-piece"></div>
                    <div class="puzzle-piece"></div><div class="puzzle-piece"></div><div class="puzzle-piece"></div><div class="puzzle-piece"></div>
                    <div class="puzzle-piece"></div><div class="puzzle-piece"></div><div class="puzzle-piece"></div><div class="puzzle-piece"></div>
                </div>
            </div>
            <p id="modal-pokemon-status" style="font-size: 26px; font-weight: bold; margin-top: 25px; text-align: center;"></p>
        </div>
        <div></div>
    </div>

</div>

<script>
    // מאגר תמונות מאמנים רשמיות ויציבות מוויקיפדיה העולמית
    const TRAINER_AVATARS = [
        { key: "ash", name: "אֵשׁ קֶטְצָ'אם", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/ca/Ash_Ketchum_Anime_Style.svg/150px-Ash_Ketchum_Anime_Style.svg.png" },
        { key: "misty", name: "מִיסְטִי", img: "https://upload.wikimedia.org/wikipedia/en/thumb/d/df/MistyPokemon.png/150px-MistyPokemon.png" },
        { key: "brock", name: "בְּרוֹק", img: "https://upload.wikimedia.org/wikipedia/en/thumb/f/f5/BrockPokemon.png/150px-BrockPokemon.png" },
        { key: "serena", name: "סֶרֶנָה", img: "https://upload.wikimedia.org/wikipedia/en/thumb/b/b5/SerenaPokemon.png/150px-SerenaPokemon.png" }
    ];

    const POKEMON_DATA = [
        { id: 25, name: "פִּיקָאצ'וּ" }, { id: 1, name: "בַּלְבָאזוֹר" }, { id: 4, name: "צָ'ארְมַנְדֶר" },
        { id: 7, name: "סְקְוִירְטֶל" }, { id: 133, name: "אִיבִי" }, { id: 94, name: "גֶנְגָאר" },
        { id: 143, name: "סְנוֹרְלַקְס" }, { id: 6, name: "צָ'ארִיזָארְד" }, { id: 9, name: "בְּלָאסְטוֹיְז" },
        { id: 3, name: "וֶנוֹזָאֹר" }, { id: 151, name: "מְיוּ" }, { id: 52, name: "מְאוּת'" },
        { id: 54, name: "פְּסַיְדָאק" }, { id: 58, name: "גְּרוֹלִית'" }, { id: 59, name: "אַרְקָנַיְין" },
        { id: 175, name: "טוֹגֶפִּי" }, { id: 39, name: "גִ'יגְלִיפָאף" }, { id: 130, name: "גְּיָארָדוֹס" },
        { id: 131, name: "לָאפְּרָאס" }, { id: 149, name: "דְּרָאגוֹנַיְיט" }
    ];

    const TOTAL_STAGES = 50;
    let globalUsers = {}; 
    let currentUserKey = null; 
    let currentAuthTab = 'login';
    let selectedTrainerKey = 'ash';

    let currentQuestionIndex = 1;
    let userTypedAnswer = "";
    let expectedAnswer = 0;
    let isLocked = false;

    function loadDatabase() {
        const data = localStorage.getItem('pokemath_ultimate_db_v5');
        if (data) {
            globalUsers = JSON.parse(data);
        } else {
            globalUsers = {};
            localStorage.setItem('pokemath_ultimate_db_v5', JSON.stringify(globalUsers));
        }
        renderTrainerPicker();
    }

    function saveDatabase() {
        localStorage.setItem('pokemath_ultimate_db_v5', JSON.stringify(globalUsers));
    }

    function setAuthTab(tab) {
        currentAuthTab = tab;
        document.getElementById('tab-login').classList.toggle('active', tab === 'login');
        document.getElementById('tab-register').classList.toggle('active', tab === 'register');

        document.getElementById('group-firstname').style.display = tab === 'register' ? 'flex' : 'none';
        document.getElementById('group-nickname').style.display = tab === 'register' ? 'flex' : 'none';
        document.getElementById('group-avatar').style.display = tab === 'register' ? 'flex' : 'none';
        
        document.getElementById('label-username').innerText = tab === 'login' ? "שֵׁם פְּרָטִי אוֹ כִּינוּי:" : "שֵׁם מִשְׁתַּמֵּשׁ (לְהִתְחַבְּרוּת הבאה):";
        document.getElementById('auth-username').placeholder = tab === 'login' ? "הַכְנֵס שֵׁם אוֹ כִּינוּי" : "בְּחַר שֵׁם מִשְׁתַּמֵּשׁ";
        document.getElementById('label-dob').innerText = tab === 'login' ? "קוֹד כְּנִיסָה (4 סִפְרוֹת):" : "קְבַע קוֹד כְּנִיסָה (4 סִפְרוֹת):";
        document.getElementById('auth-dob').placeholder = tab === 'login' ? "הַכְנֵס קוֹד" : "בְּחַר קוֹד (לְדֻגְמָא 1405)";
        document.getElementById('btn-auth-action').innerText = tab === 'login' ? "הִתְחַבֵּר וְשַׂחֵק! 🚀" : "צוֹר חֶשְׁבּוֹן וְהַתְחֵל! ✨";
    }

    function renderTrainerPicker() {
        const grid = document.getElementById('avatar-picker-grid');
        grid.innerHTML = "";
        TRAINER_AVATARS.forEach(t => {
            let item = document.createElement('div');
            item.className = `avatar-item-auth ${t.key === selectedTrainerKey ? 'selected' : ''}`;
            item.onclick = () => {
                selectedTrainerKey = t.key;
                renderTrainerPicker();
            };

            let img = document.createElement('img');
            img.className = "avatar-img-auth";
            img.src = t.img;

            let name = document.createElement('div');
            name.className = "avatar-name-auth";
            name.innerText = t.name;

            item.appendChild(img);
            item.appendChild(name);
            grid.appendChild(item);
        });
    }

    function handleAuth() {
        const usernameInput = document.getElementById('auth-username').value.trim();
        const dobInput = document.getElementById('auth-dob').value.trim();

        if (!usernameInput || !dobInput) {
            alert("נָא לְמַלֹּאת אֶת כָּל הַשָּׂדוֹת!");
            return;
        }

        if (dobInput.length !== 4 || isNaN(dobInput)) {
            alert("קוֹד הַכְּנִיסָה חַיָּב לִהְיוֹת בְּדִיּוּק 4 סִפְרוֹת (לְדֻגְמָא 1405)!");
            return;
        }

        if (currentAuthTab === 'register') {
            const firstName = document.getElementById('auth-firstname').value.trim();
            const nickname = document.getElementById('auth-nickname').value.trim();

            if (!firstName || !nickname) {
                alert("בְּהַרְשָׁמָה יֵשׁ לְהַכְנִיס שֵׁם פְּרָטִי וְכִּינוּי!");
                return;
            }

            if (globalUsers[usernameInput.toLowerCase()]) {
                alert("שֵׁם מִשְׁתַּמֵּשׁ זֶה כְּבָר תָּפוּס!");
                return;
            }

            let newUser = {
                firstName: firstName,
                nickname: nickname,
                dob: dobInput,
                avatarKey: selectedTrainerKey,
                maxUnlockedStage: 1,
                currentStreak: 0,
                progressStorage: {},
                selectedStage: 1
            };
            POKEMON_DATA.forEach(p => { newUser.progressStorage[p.id] = 0; });

            globalUsers[usernameInput.toLowerCase()] = newUser;
            globalUsers[firstName.toLowerCase()] = newUser; // מאפשר כניסה גם עם שם פרטי
            globalUsers[nickname.toLowerCase()] = newUser;  // מאפשר כניסה גם עם כינוי
            saveDatabase();

            currentUserKey = usernameInput.toLowerCase();
            alert(`חֶשְׁבּוֹן חָדָשׁ נוֹצַר בְּהַצְלָחָה לְ ${firstName}!`);
            enterApp();

        } else {
            const userKey = usernameInput.toLowerCase();
            if (globalUsers[userKey] && globalUsers[userKey].dob === dobInput) {
                currentUserKey = userKey;
                enterApp();
            } else {
                alert("שֵׁם מִשְׁתַּמֵּשׁ אוֹ קוֹד כְּנִיסָה שְׁגוּיִים!");
            }
        }
    }

    function enterApp() {
        switchScreen('screen-hub');
        const user = globalUsers[currentUserKey];
        const trainer = TRAINER_AVATARS.find(t => t.key === user.avatarKey) || TRAINER_AVATARS[0];
        
        document.getElementById('user-header-img').src = trainer.img;
        document.getElementById('user-welcome-text').innerText = `שָׁלוֹם, הַמְּאַמֵּן ${user.firstName}!`;
        
        renderStagesMap();
    }

    function handleLogout() {
        currentUserKey = null;
        document.getElementById('auth-username').value = "";
        document.getElementById('auth-dob').value = "";
        document.getElementById('auth-firstname').value = "";
        document.getElementById('auth-nickname').value = "";
        switchScreen('screen-auth');
        setAuthTab('login');
    }

    function renderStagesMap() {
        const mapContainer = document.getElementById('stages-map');
        mapContainer.innerHTML = "";
        const user = globalUsers[currentUserKey];

        for (let i = 1; i <= TOTAL_STAGES; i++) {
            let node = document.createElement('div');
            node.className = "stage-node";
            
            let title = document.createElement('div');
            title.className = "stage-node-title";
            title.innerText = `שָׁלָב ${i}`;

            let status = document.createElement('div');
            status.className = "stage-node-status";

            if (i < user.maxUnlockedStage) {
                node.classList.add('completed');
                status.innerText = "מוּשְׁלָם ✨";
                node.onclick = () => launchStage(i);
            } else if (i === user.maxUnlockedStage) {
                node.classList.add('current');
                status.innerText = "שַׂחֵק 🎯";
                node.onclick = () => launchStage(i);
            } else {
                node.classList.add('locked');
                status.innerText = "נָעוּל 🔒";
            }

            node.appendChild(title);
            node.appendChild(status);
            mapContainer.appendChild(node);
        }

        setTimeout(() => {
            const currentNodes = mapContainer.getElementsByClassName('current');
            if (currentNodes.length > 0) {
                currentNodes[0].scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }, 200);
    }

    function launchStage(stageNumber) {
        const user = globalUsers[currentUserKey];
        user.selectedStage = stageNumber;
        currentQuestionIndex = 1;
        isLocked = false;
        document.getElementById('arena-stage-title').innerText = `שָׁלָב ${stageNumber}`;
        updateTopBar();
        switchScreen('screen-game');
        generateQuestion();
    }

    function switchScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function returnToHub() {
        enterApp();
    }

    function updateTopBar() {
        const user = globalUsers[currentUserKey];
        document.getElementById('game-streak').innerText = `🔥 רֶצֶף: ${user.currentStreak}`;
        document.getElementById('game-progress').innerText = `📝 תרגיל: ${currentQuestionIndex}/7`;
    }

    function generateQuestion() {
        if (isLocked) return;
        userTypedAnswer = "";
        const inputDisplay = document.getElementById('eq-input');
        inputDisplay.innerText = "?";
        inputDisplay.style.color = "#38bdf8";
        inputDisplay.style.borderBottomColor = "#38bdf8";

        let n1, n2, op;
        op = Math.random() > 0.5 ? '+' : '-';

        if (op === '+') {
            n1 = Math.floor(Math.random() * 20) + 1;
            n2 = Math.floor(Math.random() * (30 - n1)) + 1;
            expectedAnswer = n1 + n2;
        } else {
            n1 = Math.floor(Math.random() * 25) + 6;
            n2 = Math.floor(Math.random() * (n1 - 1)) + 1;
            expectedAnswer = n1 - n2;
        }

        document.getElementById('eq-n1').innerText = n1;
        document.getElementById('eq-n2').innerText = n2;
        document.getElementById('eq-op').innerText = op;
    }

    function pressKey(key) {
        if (isLocked) return;
        if (key === 'C') { userTypedAnswer = ""; }
        else if (key === 'B') { userTypedAnswer = userTypedAnswer.slice(0, -1); }
        else { if (userTypedAnswer.length < 3) userTypedAnswer += key; }
        document.getElementById('eq-input').innerText = userTypedAnswer || "?";
    }

    function checkAnswer() {
        if (isLocked || !userTypedAnswer) return;
        const inputDisplay = document.getElementById('eq-input');
        let userVal = parseInt(userTypedAnswer);
        const user = globalUsers[currentUserKey];

        if (userVal === expectedAnswer) {
            user.currentStreak++;
            inputDisplay.style.color = "var(--success-color)";
            inputDisplay.style.borderBottomColor = "var(--success-color)";
            saveDatabase();
            isLocked = true;

            setTimeout(() => {
                isLocked = false;
                if (currentQuestionIndex >= 7) { showPuzzleScreen(); }
                else { currentQuestionIndex++; updateTopBar(); generateQuestion(); }
            }, 1000);
        } else {
            user.currentStreak = 0;
            inputDisplay.style.color = "var(--danger-color)";
            inputDisplay.style.borderBottomColor = "var(--danger-color)";
            updateTopBar();
            saveDatabase();
        }
    }

    function showPuzzleScreen() {
        switchScreen('screen-puzzle');
        const user = globalUsers[currentUserKey];
        let pkm = POKEMON_DATA[(user.selectedStage - 1) % POKEMON_DATA.length];
        
        if (user.progressStorage[pkm.id] === undefined) user.progressStorage[pkm.id] = 0;
        
        let earnedNewPiece = (user.selectedStage === user.maxUnlockedStage);
        if (earnedNewPiece) {
            user.progressStorage[pkm.id] = Math.min(user.progressStorage[pkm.id] + 1, 10);
        }
        let currentPieces = user.progressStorage[pkm.id];

        const imgBack = document.getElementById('puzzle-img-back');
        imgBack.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${pkm.id}.png`;

        if (currentPieces >= 10 && earnedNewPiece) {
            document.getElementById('puzzle-title').innerText = "הַפָּאזֶל הוּשְׁלַם! 🎉";
            document.getElementById('puzzle-status').innerText = `תָּפַסְתָּ אֶת ${pkm.name} מָלֵא!`;
            triggerCelebration();
        } else {
            document.getElementById('puzzle-title').innerText = earnedNewPiece ? "קִבַּלְתָּ חֵלֶק פָּאזֶל! 🧩" : "סִיַּמְתָּ אֶת השָּׁלָב שׁוּב! 🔄";
            document.getElementById('puzzle-status').innerText = `חֲלָקִים שֶׁנֶּחְשְׂפוּ: ${currentPieces} מִתּוֹךְ 10`;
        }

        const pieces = document.querySelectorAll('#puzzle-board .puzzle-piece');
        pieces.forEach((piece, index) => {
            if (index < currentPieces || index >= 10) { piece.classList.add('unlocked'); }
            else { piece.classList.remove('unlocked'); }
        });

        if (user.selectedStage === user.maxUnlockedStage) {
            user.maxUnlockedStage++;
        }
        saveDatabase();
    }

    function triggerCelebration() {
        for (let i = 0; i < 35; i++) {
            let confetti = document.createElement('div');
            confetti.classList.add('confetti');
            confetti.style.left = Math.random() * 100 + '%';
            confetti.style.backgroundColor = ['#ffcb05', '#3b82f6', '#10b981', '#ef4444', '#ec4899'][Math.floor(Math.random() * 5)];
            confetti.style.animationDelay = Math.random() * 1.5 + 's';
            document.body.appendChild(confetti);
            setTimeout(() => confetti.remove(), 2500);
        }
    }

    function finishPuzzleAndGoHome() { returnToHub(); }

    function openCollection() {
        const grid = document.getElementById('collection-grid');
        grid.innerHTML = "";
        const user = globalUsers[currentUserKey];

        POKEMON_DATA.forEach(p => {
            let pieces = user.progressStorage[p.id] || 0;
            let isCompleted = pieces >= 10;
            let hasAnyPieces = pieces > 0;

            let card = document.createElement('div');
            card.className = `collection-item ${isCompleted ? 'completed' : ''}`;
            card.onclick = () => viewPokemonDetails(p.id);

            let imgContainer = document.createElement('div');
            imgContainer.className = "col-img-container";

            let img = document.createElement('img');
            img.className = `col-img ${isCompleted ? 'completed' : (hasAnyPieces ? 'has-pieces' : 'locked')}`;
            img.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${p.id}.png`;
            imgContainer.appendChild(img);

            let name = document.createElement('div');
            name.className = "col-name";
            name.innerText = (hasAnyPieces || isCompleted) ? p.name : "?".repeat(p.name.length);

            let badge = document.createElement('div');
            badge.className = "col-badge";
            badge.innerText = isCompleted ? "מוּשְׁלָם! ✨" : `${pieces}/10 חֲלָקִים`;

            card.appendChild(imgContainer);
            card.appendChild(name);
            card.appendChild(badge);
            grid.appendChild(card);
        });

        switchScreen('screen-collection');
    }

    function viewPokemonDetails(pokemonId) {
        const pkm = POKEMON_DATA.find(p => p.id === pokemonId);
        const user = globalUsers[currentUserKey];
        let pieces = user.progressStorage[pokemonId] || 0;
        let isCompleted = pieces >= 10;
        let hasAnyPieces = pieces > 0;

        const modal = document.getElementById('view-pokemon-modal');
        const modalName = document.getElementById('modal-pokemon-name');
        const modalImg = document.getElementById('modal-pokemon-img');
        const modalStatus = document.getElementById('modal-pokemon-status');

        modalName.innerText = (hasAnyPieces || isCompleted) ? pkm.name : "?".repeat(pkm.name.length);
        modalImg.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${pkm.id}.png`;
        modalStatus.innerText = isCompleted ? "פּוֹקֵימוֹן מוּשְׁלָם וְתָפוּס! ✨" : `נֶחְשְׂפוּ ${pieces} מִתּוֹךְ 10 חֲלָקִים`;

        const modalPieces = document.querySelectorAll('#modal-puzzle-board .puzzle-piece');
        modalPieces.forEach((piece, index) => {
            if (index < pieces || index >= 10) { piece.classList.add('unlocked'); }
            else { piece.classList.remove('unlocked'); }
        });

        modal.classList.add('active');
    }

    function closePokemonModal() {
        document.getElementById('view-pokemon-modal').classList.remove('active');
    }

    window.onload = loadDatabase;
</script>
</body>
</html>
